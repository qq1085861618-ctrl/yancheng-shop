<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513"/>
      <stop offset="100%" style="stop-color:#D2691E"/>
    </linearGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
  </defs>
  <!-- Gift Box -->
  <rect x="12" y="28" width="40" height="32" rx="4" fill="url(#boxGrad)"/>
  <rect x="8" y="24" width="48" height="12" rx="3" fill="url(#boxGrad)"/>
  <!-- Ribbon Vertical -->
  <rect x="28" y="24" width="8" height="36" fill="#e94560"/>
  <!-- Ribbon Horizontal -->
  <rect x="8" y="26" width="48" height="8" fill="#e94560"/>
  <!-- Bow -->
  <ellipse cx="24" cy="22" rx="8" ry="6" fill="#e94560"/>
  <ellipse cx="40" cy="22" rx="8" ry="6" fill="#e94560"/>
  <circle cx="32" cy="24" r="5" fill="#c73e54"/>
  <!-- Star accent -->
  <polygon points="32,4 34,10 40,10 35,14 37,20 32,16 27,20 29,14 24,10 30,10" fill="url(#starGrad)"/>
